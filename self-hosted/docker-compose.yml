# PR-Agent RELIABILITY stack (GLM-5, self-hosted) — ПРОД-конфиг для Dokploy "Compose".
#
# ⚠️ GO-LIVE: с этого момента прод-деплой запускает отказоустойчивый слой
# `reliability/` (ingress → durable queue → worker → sweeper), а НЕ «голый»
# webhook-сервер pr-agent. Цель — «не молчать»: любой сбой/зависание Z.AI даёт
# видимый коммент в PR, а не тишину (issue #1, СТ-1..35). Прежнее поведение —
# в docker-compose.legacy-pr-agent.yml (быстрый откат). Полная процедура и
# приёмка — в GO-LIVE.md.
#
# Env в Dokploy → Environment (single-line; см. SETUP.md). Обязательные:
#   OPENAI_KEY  GITHUB_APP_ID  GITHUB_WEBHOOK_SECRET  GITHUB_PRIVATE_KEY_B64
#   RELIABILITY_REPOS="owner/repo,owner/repo2"   (для sweeper; иначе он бездействует)
# Остальное — с дефолтами (LLM endpoint, модель, лимиты, gateway/sweeper-настройки).
#
# Три процесса делят один volume с SQLite (state + queue):
#   ingress  — принимает webhook, кладёт в очередь (порт 3000: /webhook /health /metrics)
#   worker   — очередь → pr-agent (через LLM Gateway) → ack/nack, при DLQ коммент в PR
#   sweeper  — периодически дозапускает пропущенное/застрявшее
#
# Предусловие сборки: образ базового pr-agent (`pr-agent-github-app:local`) строится
# сервисом `pr-agent-base` (одноразовый, только ради образа); reliability-образ
# наследуется от него (Dockerfile.reliability). `docker compose up -d --build`
# соберёт base первым (depends_on) — образ будет готов до сборки reliability.

x-reliability-env: &reliability-env
  OPENAI_KEY: "${OPENAI_KEY}"
  OPENAI_API_BASE: "${OPENAI_API_BASE:-}"
  CONFIG_MODEL: "${CONFIG_MODEL:-}"
  CONFIG_MAX_TOKENS: "${CONFIG_MAX_TOKENS:-}"
  CONFIG_AI_TIMEOUT: "${CONFIG_AI_TIMEOUT:-90}"
  GITHUB_APP_ID: "${GITHUB_APP_ID}"
  GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET}"
  GITHUB_PRIVATE_KEY_B64: "${GITHUB_PRIVATE_KEY_B64}"
  RELIABILITY_DB: "/data/reliability.db"
  RELIABILITY_QUEUE: "/data/queue.db"
  RELIABILITY_MAX_ATTEMPTS: "${RELIABILITY_MAX_ATTEMPTS:-5}"

services:
  # Одноразовая сборка базового образа pr-agent из upstream. Не «служит» — только
  # тегирует pr-agent-github-app:local, от которого наследуется reliability-образ.
  # /bin/true → контейнер сразу завершается (restart: no), образ остаётся.
  pr-agent-base:
    build:
      context: https://github.com/qodo-ai/pr-agent.git
      dockerfile: docker/Dockerfile
      target: github_app
    image: pr-agent-github-app:local
    entrypoint: ["/bin/true"]
    restart: "no"

  ingress:
    build:
      context: .
      dockerfile: Dockerfile.reliability
    image: pr-agent-reliability:local
    restart: unless-stopped
    depends_on:
      - pr-agent-base            # гарантирует, что базовый образ собран раньше
    environment: *reliability-env
    command: ["uvicorn", "reliability.app:app", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - reliability-data:/data
    expose:
      - "3000"                   # webhook GitHub App → :3000/webhook ; healthcheck → /health ; метрики → /metrics
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 3000), 3).close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: pr-agent-reliability:local
    restart: unless-stopped
    depends_on:
      - ingress                  # образ уже собран сервисом ingress
    environment:
      <<: *reliability-env
      # LLM Gateway (СТ-19..24): rate limit + circuit breaker вокруг Z.AI
      RELIABILITY_LLM_RPS: "${RELIABILITY_LLM_RPS:-3}"                 # запросов/сек к LLM (процессный! ≈ лимит/реплик)
      RELIABILITY_LLM_BURST: "${RELIABILITY_LLM_BURST:-6}"            # ёмкость всплеска
      RELIABILITY_CB_THRESHOLD: "${RELIABILITY_CB_THRESHOLD:-5}"      # сбоев подряд → размыкание
      RELIABILITY_CB_RESET: "${RELIABILITY_CB_RESET:-30}"            # сек до пробного вызова
      RELIABILITY_ATTEMPT_TIMEOUT: "${RELIABILITY_ATTEMPT_TIMEOUT:-75}"  # < task_timeout
      RELIABILITY_TASK_TIMEOUT: "${RELIABILITY_TASK_TIMEOUT:-90}"
      RELIABILITY_BACKOFF: "${RELIABILITY_BACKOFF:-10}"                 # сек ×attempts на сбое (не спиним)
      RELIABILITY_BACKPRESSURE_DELAY: "${RELIABILITY_BACKPRESSURE_DELAY:-5}"  # сек отсрочки при rate-limit
    command: ["python", "-m", "reliability.worker"]
    volumes:
      - reliability-data:/data

  sweeper:
    image: pr-agent-reliability:local
    restart: unless-stopped
    depends_on:
      - ingress
    environment:
      <<: *reliability-env
      RELIABILITY_REPOS: "${RELIABILITY_REPOS}"                      # "owner/repo,..." — конкретные репо; ПУСТО → org-wide (все установки App)
      RELIABILITY_COMMANDS: "${RELIABILITY_COMMANDS:-/describe,/review}"
      RELIABILITY_SWEEP_INTERVAL: "${RELIABILITY_SWEEP_INTERVAL:-300}"
      RELIABILITY_STALE_DEADLINE: "${RELIABILITY_STALE_DEADLINE:-1800}"
      RELIABILITY_VERIFY_GITHUB: "${RELIABILITY_VERIFY_GITHUB:-}"    # "1" — детект проглоченного сбоя (тюнится на смоуке)
    command: ["python", "-m", "reliability.sweeper_runner"]
    volumes:
      - reliability-data:/data

volumes:
  reliability-data:
