# ⏪ ROLLBACK-конфиг: «голый» pr-agent webhook-сервер (состояние ДО go-live).
#
# Это точная копия прежнего docker-compose.yml (один сервис pr-agent, gunicorn на
# pr_agent.servers.github_app:app). Держим для быстрого отката: если reliability-
# стек в go-live даст сбой на смоуке — вернуться на это поведение одной командой:
#
#   docker compose -f docker-compose.legacy-pr-agent.yml up -d --build
#
# (и вернуть webhook GitHub App на /api/v1/github_webhooks этого сервиса).
# Прод-стек по умолчанию теперь — docker-compose.yml (ingress/worker/sweeper).
# См. GO-LIVE.md.
services:
  pr-agent:
    build:
      # Build the github_app image straight from upstream — no local clone needed.
      context: https://github.com/qodo-ai/pr-agent.git
      dockerfile: docker/Dockerfile
      target: github_app
    image: pr-agent-github-app:local
    restart: unless-stopped
    environment:
      - PORT=3000
      - "OPENAI_KEY=${OPENAI_KEY}"
      - "OPENAI_API_BASE=${OPENAI_API_BASE:-}"
      - "CONFIG_MODEL=${CONFIG_MODEL:-}"
      - "CONFIG_MAX_TOKENS=${CONFIG_MAX_TOKENS:-}"
      - "CONFIG_AI_TIMEOUT=${CONFIG_AI_TIMEOUT:-}"   # fail-fast timeout, c (Фаза 0, issue #1)
      - "GITHUB_APP_ID=${GITHUB_APP_ID}"
      - "GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}"
      - "GITHUB_PRIVATE_KEY_B64=${GITHUB_PRIVATE_KEY_B64}"
    # $$ escapes compose interpolation so values are read from the container env
    # at runtime; ${VAR:-default} supplies fallbacks. Writes the FULL [github],
    # [openai] and [config] tables (pr-agent replaces a section wholesale when it
    # loads .secrets.toml, so partial tables lose their other keys).
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /app/pr_agent/settings
        {
          printf '[openai]\n'
          printf 'key = "%s"\n' "$$OPENAI_KEY"
          printf 'api_base = "%s"\n' "$${OPENAI_API_BASE:-https://api.z.ai/api/coding/paas/v4}"
          printf '\n[config]\n'
          printf 'git_provider = "github"\n'
          printf 'model = "%s"\n' "$${CONFIG_MODEL:-openai/glm-5}"
          printf 'model_turbo = "%s"\n' "$${CONFIG_MODEL:-openai/glm-5}"
          # fallback_models повторяет ту же модель дважды: retry_with_fallback_models
          # делает второй прогон при транзиентной ошибке. Единственный ключ Z.AI —
          # настоящего кросс-провайдерного резерва нет (см. issue #1, Фаза 3/4).
          printf 'fallback_models = ["%s", "%s"]\n' "$${CONFIG_MODEL:-openai/glm-5}" "$${CONFIG_MODEL:-openai/glm-5}"
          printf 'custom_model_max_tokens = %s\n' "$${CONFIG_MAX_TOKENS:-128000}"
          # ai_timeout: fail-fast — зависший LLM-вызов падает за N c, а не держит
          # воркер бесконечно (Фаза 0, issue #1; было 120 по умолчанию).
          printf 'ai_timeout = %s\n' "$${CONFIG_AI_TIMEOUT:-90}"
          printf '\n[github]\n'
          printf 'deployment_type = "app"\n'
          printf 'app_id = "%s"\n' "$$GITHUB_APP_ID"
          printf 'webhook_secret = "%s"\n' "$$GITHUB_WEBHOOK_SECRET"
          printf 'private_key = """\n'
          printf '%s' "$$GITHUB_PRIVATE_KEY_B64" | base64 -d
          printf '\n"""\n'
        } > /app/pr_agent/settings/.secrets.toml
        exec python -m gunicorn -k uvicorn.workers.UvicornWorker \
          -c pr_agent/servers/gunicorn_config.py --forwarded-allow-ips '*' \
          pr_agent.servers.github_app:app
    expose:
      - "3000"
    # Liveness-проба (Фаза 0, issue #1). Dokploy работает поверх Docker Swarm —
    # нездоровая задача пересоздаётся. ВНИМАНИЕ: TCP-проба ловит только полную
    # смерть процесса; логически зависший LLM-вызов она НЕ видит (сокет жив) —
    # это задача reconciliation sweeper из Фазы 3.
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 3000), 3).close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
